name: Release

on:
  push:
    branches:
      - release

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Build release (x64)
        run: cargo build --release

      - name: Build release (ARM64)
        run: cargo build --release --target aarch64-pc-windows-msvc

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Build MSI installer (x64)
        run: cargo wix --nocapture

      - name: Build MSI installer (ARM64)
        run: cargo wix --target aarch64-pc-windows-msvc --nocapture

      - name: Stage ARM64 executable
        run: Copy-Item target/aarch64-pc-windows-msvc/release/lazywslc.exe lazywslc-arm64.exe

      - name: Get version
        id: version
        run: |
          $ver = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          echo "VERSION=v$ver" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          files: |
            target/release/lazywslc.exe
            lazywslc-arm64.exe
            target/wix/*.msi
          generate_release_notes: true

      - name: Publish to WinGet
        # Never fail the release if WinGet publishing has a problem (e.g. the
        # package isn't in winget-pkgs yet, or WINGET_TOKEN isn't set). The
        # GitHub Release above has already been created at this point.
        continue-on-error: true
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $tag = "${{ steps.version.outputs.VERSION }}"   # e.g. v0.1.4
          $version = $tag.TrimStart('v')                  # e.g. 0.1.4
          $base = "https://github.com/${{ github.repository }}/releases/download/$tag"

          # Asset names are produced by the cargo-wix steps above.
          $x64Url = "$base/lazywslc-$version-x86_64.msi"
          $arm64Url = "$base/lazywslc-$version-aarch64.msi"

          $wingetPackageId = "crloewen.lazywslc"

          & curl.exe -JLO https://aka.ms/wingetcreate/latest
          & .\wingetcreate.exe update $wingetPackageId -s -v $version -u "$x64Url|x64" "$arm64Url|arm64" -t "${{ secrets.WINGET_TOKEN }}"
